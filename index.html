<script>
  async function loadGallery() {
    const status = document.getElementById("status");
    const gallery = document.getElementById("gallery");

    try {
      const response = await fetch("img_urls.txt");
      if (!response.ok) throw new Error("img_urls.txt를 불러오지 못했습니다.");
      const text = await response.text();

      const sections = [];
      let currentSection = {
        title: "전체 이미지",
        link: "",
        images: [],
      };

      text.split(/\r?\n/).forEach((rawLine) => {
        const line = rawLine.trim();
        if (!line) return;

        // 섹션 헤더 파싱: # 제목 | 링크
        if (line.startsWith("#")) {
          if (
            currentSection.images.length ||
            currentSection.title !== "전체 이미지"
          ) {
            sections.push(currentSection);
          }

          const headerContent = line.replace(/^#\s*/, "").trim();
          const separatorIndex = headerContent.indexOf("|");

          let title = headerContent;
          let link = "";

          if (separatorIndex >= 0) {
            title = headerContent.slice(0, separatorIndex).trim();
            link = headerContent.slice(separatorIndex + 1).trim();
          }

          currentSection = {
            title,
            link,
            images: [],
          };
          return;
        }

        // 이미지 줄 파싱: URL | 제목
        const separatorIndex = line.indexOf("|");
        const url =
          separatorIndex >= 0 ? line.slice(0, separatorIndex).trim() : line;
        const imageTitle =
          separatorIndex >= 0
            ? line.slice(separatorIndex + 1).trim()
            : url.split("/").pop();

        currentSection.images.push({
          url,
          title: imageTitle,
        });
      });

      if (
        currentSection.images.length ||
        currentSection.title !== "전체 이미지"
      ) {
        sections.push(currentSection);
      }

      if (!sections.length) {
        status.textContent =
          "이미지 목록이 비어 있습니다. img_urls.txt 파일을 확인하세요.";
        return;
      }

      gallery.innerHTML = sections
        .map(
          (section) => `
        <div style="grid-column: 1 / -1; margin-top: 24px;">
          <div style="
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:16px;
            border-bottom: 2px solid rgba(255,255,255,.2);
            padding-bottom: 12px;
            flex-wrap: wrap;
          ">
            <h2 style="margin:0; font-size:1.4rem; color:#f5f5f5;">
              ${section.title}
            </h2>

            ${
              section.link
                ? `
                  <a
                    href="${section.link}"
                    target="_blank"
                    rel="noreferrer"
                    style="
                      display:inline-block;
                      padding:10px 14px;
                      border-radius:10px;
                      background:#8bd6ff;
                      color:#111;
                      font-weight:700;
                      text-decoration:none;
                      white-space:nowrap;
                    "
                  >
                    교안 예시 보기
                  </a>
                `
                : ""
            }
          </div>
        </div>

        ${section.images
          .map(
            (img) => `
          <article class="card">
            <img loading="lazy" src="${img.url}" alt="${img.title}" />
            <div class="meta">
              <a href="${img.url}" target="_blank" rel="noreferrer">${img.title}</a>
            </div>
          </article>
        `,
          )
          .join("")}
      `,
        )
        .join("");

      status.remove();
    } catch (error) {
      status.textContent = "오류 발생: " + error.message;
    }
  }

  loadGallery();
</script>

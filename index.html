<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Coding Characters 이미지 갤러리</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #f5f5f5;
    }
    header {
      padding: 24px 16px;
      text-align: center;
      background: #1b1b1b;
      box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }
    header h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: -.03em;
    }
    header p {
      margin: 8px auto 0;
      max-width: 720px;
      color: #aaa;
      line-height: 1.6;
    }
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      padding: 16px;
      max-width: 1280px;
      margin: 0 auto 32px;
    }
    .card {
      background: #161616;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .card img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #222;
    }
    .card .meta {
      padding: 12px 14px 16px;
      font-size: .95rem;
      color: #ddd;
      word-break: break-word;
    }
    .card a {
      color: #8bd6ff;
      text-decoration: none;
    }
    .card a:hover {
      text-decoration: underline;
    }
    .notice {
      width: min(980px, calc(100% - 32px));
      margin: 16px auto;
      padding: 14px 16px;
      border-radius: 14px;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,.08);
      color: #ccc;
    }
  </style>
</head>
<body>
  <header>
    <h1>Vibe Coding Characters 이미지</h1>
    <p>이 페이지는 루트(`/`)에 배포되었을 때, `img_urls.txt` 파일에 있는 이미지 URL을 모두 읽어와서 보여줍니다.</p>
  </header>

  <div class="notice">이미지 파일이 많을 경우 로드에 시간이 걸릴 수 있습니다. 이미지가 표시되지 않으면 배포된 파일 경로가 올바른지 확인하세요.</div>

  <div id="gallery"></div>
  <div class="notice" id="status">이미지를 불러오는 중입니다...</div>

  <script>
    async function loadGallery() {
      const status = document.getElementById('status');
      const gallery = document.getElementById('gallery');

      try {
        const response = await fetch('img_urls.txt');
        if (!response.ok) throw new Error('img_urls.txt를 불러오지 못했습니다.');
        const text = await response.text();
        const lines = text
          .split(/\r?\n/)
          .map(line => line.trim())
          .filter(line => line && !line.startsWith('#'));

        if (!lines.length) {
          status.textContent = '이미지 목록이 비어 있습니다. img_urls.txt 파일을 확인하세요.';
          return;
        }

        gallery.innerHTML = lines.map(line => {
          const separatorIndex = line.indexOf('|');
          const url = separatorIndex >= 0 ? line.slice(0, separatorIndex).trim() : line;
          const title = separatorIndex >= 0 ? line.slice(separatorIndex + 1).trim() : url.split('/').pop();

          return `
            <article class="card">
              <img loading="lazy" src="${url}" alt="${title}" />
              <div class="meta"><a href="${url}" target="_blank" rel="noreferrer">${title}</a></div>
            </article>
          `;
        }).join('');

        status.remove();
      } catch (error) {
        status.textContent = '오류 발생: ' + error.message;
      }
    }

    loadGallery();
  </script>
</body>
</html>

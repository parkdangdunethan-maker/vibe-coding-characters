<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Coding Characters 이미지 갤러리</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #f5f5f5;
    }
    header {
      padding: 24px 16px;
      text-align: center;
      background: #1b1b1b;
      box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }
    header h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: -.03em;
    }
    header p {
      margin: 8px auto 0;
      max-width: 720px;
      color: #aaa;
      line-height: 1.6;
    }
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      padding: 16px;
      max-width: 1280px;
      margin: 0 auto 32px;
    }
    .card {
      background: #161616;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .card img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #222;
    }
    .card .meta {
      padding: 12px 14px 16px;
      font-size: .95rem;
      color: #ddd;
      word-break: break-word;
    }
    .card a {
      color: #8bd6ff;
      text-decoration: none;
    }
    .card a:hover {
      text-decoration: underline;
    }
    .notice {
      width: min(980px, calc(100% - 32px));
      margin: 16px auto;
      padding: 14px 16px;
      border-radius: 14px;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,.08);
      color: #ccc;
    }
  </style>
</head>
<body>
  <header>
    <h1>Vibe Coding Characters 이미지</h1>
    <p>이 페이지는 루트(`/`)에 배포되었을 때, `img_urls.txt` 파일에 있는 이미지 URL을 모두 읽어와서 보여줍니다.</p>
  </header>

  <div class="notice">이미지 파일이 많을 경우 로드에 시간이 걸릴 수 있습니다. 이미지가 표시되지 않으면 배포된 파일 경로가 올바른지 확인하세요.</div>

  <div id="gallery"></div>
  <div class="notice" id="status">이미지를 불러오는 중입니다...</div>

  <script>
    async function loadGallery() {
      const status = document.getElementById('status');
      const gallery = document.getElementById('gallery');

      try {
        const response = await fetch('img_data.txt');
        if (!response.ok) throw new Error('img_data.txt를 불러오지 못했습니다.');
        const text = await response.text();
        
        let currentSection = '';
        const sections = [];
        let currentImages = [];

        text.split(/\r?\n/).forEach(line => {
          const trimmed = line.trim();
          
          if (trimmed.startsWith('#')) {
            if (currentImages.length > 0) {
              sections.push({ title: currentSection, images: currentImages });
              currentImages = [];
            }
            currentSection = trimmed.replace(/^#\s*/, '');
          } else if (trimmed && !trimmed.startsWith('#')) {
            const parts = trimmed.split('|');
            if (parts.length === 2) {
              currentImages.push({
                url: parts[0].trim(),
                desc: parts[1].trim()
              });
            }
          }
        });

        if (currentImages.length > 0) {
          sections.push({ title: currentSection, images: currentImages });
        }

        if (!sections.length) {
          status.textContent = '이미지 목록이 비어 있습니다. img_data.txt 파일을 확인하세요.';
          return;
        }

        gallery.innerHTML = sections.map(section => `
          <div style="grid-column: 1 / -1; margin-top: 24px;">
            <h2 style="margin: 0 0 16px 0; font-size: 1.4rem; color: #f5f5f5; border-bottom: 2px solid rgba(255,255,255,.2); padding-bottom: 12px;">${section.title}</h2>
          </div>
          ${section.images.map(img => `
            <article class="card">
              <img loading="lazy" src="${img.url}" alt="${img.desc}" />
              <div class="meta"><a href="${img.url}" target="_blank" rel="noreferrer">${img.desc}</a></div>
            </article>
          `).join('')}
        `).join('');

        status.remove();
      } catch (error) {
        status.textContent = '오류 발생: ' + error.message;
      }
    }

    loadGallery();
  </script>
</body>
</html>

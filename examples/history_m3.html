<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏺 내가 끌리는 역사 감성 찾기</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Gowun Dodum', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            max-width: 100%;
            overflow-x: hidden;
            word-break: keep-all;
            line-height: 1.6;
            letter-spacing: -0.2px;
            background-color: #f2f4f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 🚨 절대 변하지 않는 카드 박스 고정 규격 (2단계 보존) */
        .app-card {
            width: 100%;
            max-width: 420px;
            height: 580px;
            padding: 24px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            margin: 0 auto;
            background: #ffffff;
            position: relative;
            overflow-x: hidden;
            overflow-y: hidden; /* 시퀀스 중 스크롤 튐 방지, 결과창 내부에서 스크롤 제어 */
            display: flex;
            flex-direction: column;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            flex-shrink: 0;
        }

        .slider-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            flex: 1;
            position: relative;
        }

        #question-area-box {
            display: flex;
            width: 100%;
            flex: 1;
            transition: transform 0.25s ease-in-out;
        }

        /* 🚨 메인 버튼 규격 보존 및 hover 효과 (scale 제한) */
        .main-btn {
            width: 100%;
            min-height: 52px;
            flex-shrink: 0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;
            border: none;
            background: #4a6fa5;
            color: #ffffff;
            transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.1s ease;
        }
        
        .main-btn:hover {
            background: #3b5c8a;
            transform: translateY(-1px); /* ⑦ scale 금지, 잔여 스크롤 유발 방지 */
        }

        .back-btn {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            position: absolute;
            top: 14px;
            left: 14px;
            border-radius: 50%;
            border: 1px solid #e5e5e5;
            background: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 10;
        }

        #start-screen {
            gap: 14px;
            text-align: center;
            padding-top: 40px;
        }
        .start-emoji {
            font-size: 64px;
            margin: 20px 0;
        }

        #question-screen {
            gap: 14px;
            padding-top: 30px;
        }

        .progress-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .progress-text {
            font-size: 13px;
            color: #888888;
            font-weight: bold;
        }
        .progress-bg {
            width: 100%;
            height: 8px;
            background: #eef2f7;
            border-radius: 4px;
            overflow: hidden;
        }
        /* ⑥ 진행률 바 transition */
        .progress-bar {
            height: 100%;
            background: #4a6fa5;
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-text {
            font-size: 17px;
            font-weight: bold;
            color: #333333;
            margin: 10px 0 5px 0;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-card {
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid #e5e5e5;
            flex-shrink: 0;
            cursor: pointer;
            background: #ffffff;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .option-card:hover {
            border-color: #4a6fa5;
            background-color: #f9fbfd;
        }
        .option-card.selected {
            border-color: #4a6fa5;
            background-color: #edf2f9;
        }
        .option-card input[type="radio"] {
            display: none;
        }

        /* ⑤ 선택 카드 ripple 효과 크기 및 확산 설정 */
        .ripple {
            position: absolute;
            background: rgba(74, 111, 165, 0.2);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 0.5s linear;
            pointer-events: none;
        }
        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 🚨 [3단계 신규 화면 CSS — 정중앙 배치 규격] */
        #loading-screen, #character-intro {
            width: 100%;
            height: 100%;
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Step 1: 분석 중 깜빡임 애니메이션 */
        .loading-title {
            font-size: 26px;
            font-weight: bold;
            color: #333;
        }
        .dots::after {
            content: '';
            animation: loading-dots 1.5s infinite step-start;
        }
        @keyframes loading-dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }

        /* Step 2: 캐릭터 인트로 요소 연출 */
        .intro-sub {
            font-size: 18px;
            color: #666;
            opacity: 0;
        }
        .intro-sub.fade-in {
            animation: fadeIn 0.4s forwards ease-out;
        }
        .intro-main {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            opacity: 0;
            transform: translateY(-20px);
        }
        .intro-main.drop-in {
            animation: dropIn 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .intro-img-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: auto;
        }
        /* ⑧ 캐릭터 등장 시 살짝 바운스 */
        .intro-char-img {
            width: 300px;
            height: auto;
            max-width: 100%;
            opacity: 0;
            transform: scale(0.5);
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .intro-char-img.bounce-in {
            opacity: 1;
            transform: scale(1.0);
            animation: bounceInit 0.6s ease-out forwards;
        }
        @keyframes bounceInit {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            80% { transform: scale(0.95); }
            100% { transform: scale(1.0); }
        }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes dropIn { to { opacity: 1; transform: translateY(0); } }

        /* Step 3: 페이드아웃 및 축소 이동 */
        .intro-sub.fade-out {
            animation: fadeOut 0.4s forwards ease-out;
        }
        @keyframes fadeOut { to { opacity: 0; } }

        .intro-char-img.shrink-settle {
            width: 130px;
        }

        /* 🚨 [Step 4] 최종 결과 화면 구성 레이아웃 준수 */
        #result-screen {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            gap: 12px;
            overflow-y: auto;          
            overflow-x: hidden;        
            scrollbar-width: none;     
            -ms-overflow-style: none;  
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        #result-screen::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }

        /* ① 캐릭터 이미지 전용 배치 영역 및 ② 무한 흔들림 */
        .result-img-box {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 130px;
        }
        .final-char-img {
            max-width: 130px;
            height: auto;
        }
        .fallback-emoji-style {
            font-size: 80px;
            text-align: center;
        }
        /* ② 최종 캐릭터 idle 흔들림 */
        .wobble-active {
            animation: wobbleBig 1.8s ease-in-out infinite;
        }
        @keyframes wobbleBig {
            0%, 100% { transform: rotate(-10deg) scale(1); }
            25%      { transform: rotate(8deg) scale(1.08); }
            50%      { transform: rotate(-8deg) scale(0.96); }
            75%      { transform: rotate(10deg) scale(1.08); }
        }

        .result-type-title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            color: #333333;
        }

        /* ③ 분석 멘트 박스 디자인 */
        .analysis-comment-box {
            background-color: #f1f3f5;
            padding: 10px 14px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
            letter-spacing: -0.2px;
            word-break: keep-all;
        }

        /* ④ 어떤 역사 감성일까? 박스 디자인 */
        .description-box {
            background-color: #f8f9fa;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13.5px;
            color: #555555;
            border-left: 4px solid #adb5bd;
        }
        
        /* ⑤ 💡 실천제안 강조등장 + glow 효과 */
        .suggestion-box {
            background-color: #f6ffed;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #b7eb8f;
            font-size: 14px;
            color: #237804;
            transform: scale(0.9);
            opacity: 0;
        }
        .suggestion-box.glow-in {
            animation: suggestionGlow 0.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        @keyframes suggestionGlow {
            to {
                transform: scale(1.0);
                opacity: 1;
                box-shadow: 0 0 12px rgba(183, 235, 143, 0.6);
            }
        }

        /* ④ 정보 카드 stagger 페이드인 효과 */
        .stagger-item {
            opacity: 0;
            transform: translateY(10px);
        }
        .stagger-item.fade-in-active {
            animation: staggerFade 0.5s forwards ease-out;
        }
        @keyframes staggerFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-slot-info {
            font-size: 11px;
            color: #bbbbbb;
            text-align: center;
            margin-top: 5px;
        }
        .footer-text {
            font-size: 11px;
            opacity: 0.7;
            text-align: center;
            margin-top: 15px;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <div class="app-card">
        
        <div id="start-screen" class="screen">
            <div style="margin-top: 20px;">
                <h1 style="font-size: 24px; color: #333333; margin-bottom: 10px;">🏺 내가 끌리는 역사 감성 찾기</h1>
                <p style="font-size: 14px; color: #666666; padding: 0 10px;">내가 가장 끌리는 역사 감성은 무엇일까요? 아래의 질문에 답하고 나의 역사 감성을 알아보아요!</p>
            </div>
            <div class="start-emoji">🏺</div>
            <button class="main-btn" onclick="startQuiz()">🚀 나의 역사 감성 알아보기</button>
        </div>

        <div id="question-screen" class="screen" style="display: none;">
            <button id="back-btn" class="back-btn" onclick="goBack()">⬅️</button>
            
            <div class="progress-wrapper">
                <div class="progress-text" id="progress-text">Q1 / 5</div>
                <div class="progress-bg">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>

            <div class="slider-container">
                <div id="question-area-box">
                    <div class="screen" id="current-question-node">
                        <div class="question-text" id="q-text">질문 텍스트</div>
                        <div class="options-container" id="options-wrapper"></div>
                    </div>
                </div>
            </div>

            <button class="main-btn" id="next-submit-btn" onclick="processNext()">다음 질문으로 ➡️</button>
        </div>

        <div id="loading-screen">
            <div class="loading-title">분석중<span class="dots"></span></div>
        </div>

        <div id="character-intro">
            <div class="intro-sub" id="intro-sub-text">당신은...</div>
            <div class="intro-main" id="intro-main-type">유형명 자리</div>
            <div class="intro-img-wrap" id="intro-img-area" style="margin-top: 20px;"></div>
        </div>

        <div id="result-screen">
            <div class="result-img-box" id="res-img-frame"></div>
            
            <div class="result-type-title" id="res-type"></div>
            
            <div class="analysis-comment-box stagger-item" id="res-analysis-comment"></div>
            
            <div class="description-box stagger-item">
                <p style="font-weight: bold; margin-bottom: 4px; color: #333;">어떤 역사 감성일까?</p>
                <span id="res-description"></span>
            </div>
            
            <div class="suggestion-box" id="res-suggestion-card">
                <p style="font-weight: bold; margin-bottom: 4px; color: #135200;">💡 실천제안</p>
                <span id="res-suggestion"></span>
            </div>

            <button class="main-btn" onclick="resetQuiz()">🔄 다시 하기</button>
        </div>

    </div>

    <div class="custom-slot-info">[분위기: 애니메이션 인터랙션] / [색감: 차분한 블루] / [폰트: 고운돋움]</div>
    <div class="footer-text">AI의 도움을 받아 제작된 콘텐츠입니다.</div>

    <script>
        // [절대 변경 금지 데이터 및 로직 보존]
        const QUIZ_QUESTIONS = [
            {
                id: 1,
                q: "Q1. 더 끌리는 역사 유물의 특징은?",
                options: [
                    { text: "① 금빛 장신구처럼 화려하고 정교한 유물 👑", type: "신라 화려형" },
                    { text: "② 고분 벽화처럼 힘차고 역동적인 표현 ⚔️", type: "고구려 역동형" },
                    { text: "③ 금동대향로처럼 섬세하고 우아한 공예 🍃", type: "백제 우아형" },
                    { text: "④ 백자처럼 절제되고 실용적인 아름다움 🌿", type: "조선 절제형" }
                ]
            },
            {
                id: 2,
                q: "Q2. 박물관에서 가장 오래 보고 싶은 전시는?",
                options: [
                    { text: "① 금관, 금제 허리띠 등 반짝이는 장신구 전시 ✨", type: "신라 화려형" },
                    { text: "② 수렵도, 사신도처럼 움직임이 느껴지는 고분 벽화 전시 🐎", type: "고구려 역동형" },
                    { text: "③ 향로, 관식, 석수처럼 섬세한 공예품 전시 🎨", type: "백제 우아형" },
                    { text: "④ 백자, 기록유산, 과학기구처럼 쓰임이 분명한 유물 전시 📚", type: "조선 절제형" }
                ]
            },
            {
                id: 3,
                q: "Q3. 내가 더 가지고 싶은 굿즈는?",
                options: [
                    { text: "① 금관 무늬를 활용한 화려한 액세서리 💎", type: "신라 화려형" },
                    { text: "② 고구려 벽화 속 말과 인물을 활용한 다이내믹 굿즈 🛡️", type: "고구려 역동형" },
                    { text: "③ 백제 문양을 활용한 우아한 향낭이나 공예 소품 🍶", type: "백제 우아형" },
                    { text: "④ 백자와 한글을 활용한 깔끔한 문구류 ✍️", type: "조선 절제형" }
                ]
            },
            {
                id: 4,
                q: "Q4. 더 가보고 싶은 역사 공간은?",
                options: [
                    { text: "① 신라 금관과 왕릉 문화를 볼 수 있는 경주 🏺", type: "신라 화려형" },
                    { text: "② 고분 벽화와 광개토대왕릉비를 떠올릴 수 있는 전시관 🐎", type: "고구려 역동형" },
                    { text: "③ 백제 문화유산과 공예의 아름다움을 볼 수 있는 공주·부여 🏛️", type: "백제 우아형" },
                    { text: "④ 궁궐, 서원, 기록문화를 함께 볼 수 있는 조선 역사 공간 🌿", type: "조선 절제형" }
                ]
            },
            {
                id: 5,
                q: "Q5. 내가 더 좋아하는 활동은?",
                options: [
                    { text: "① 눈에 띄는 문양과 색으로 꾸미기 ✨", type: "신라 화려형" },
                    { text: "② 넓은 무대에서 힘차게 움직이며 탐험하기 🚀", type: "고구려 역동형" },
                    { text: "③ 섬세한 문양을 관찰하고 직접 만들어 보기 🎨", type: "백제 우아형" },
                    { text: "④ 내용을 기록하고 의미를 차분히 정리하기 📖", type: "조선 절제형" }
                ]
            }
        ];

        const SUGGESTIONS = {
          "신라 화려형": [
            "경주 박물관의 금관·금제 허리띠를 골라 굿즈 디자인 아이디어를 그려 보세요!",
            "신라 황금 문화를 주제로 친구들과 짧은 소개 영상을 만들어 보세요!",
            "신라 왕릉(천마총·황남대총)을 한 곳 골라 미니 여행 코스를 만들어 보세요!",
            "신라 장신구 패턴을 활용해 나만의 디자인 카드를 만들어 보세요!",
            "신라의 화려한 공예 문화를 친구에게 추천하는 한 줄 큐레이션을 작성해 보세요!",
          ],
          "고구려 역동형": [
            "고구려 고분 벽화(수렵도·사신도)를 비교해 좋아하는 장면을 골라 그려 보세요!",
            "광개토대왕릉비 이야기를 친구들에게 설명하는 미니 발표에 도전해 보세요!",
            "고구려의 기마 문화를 다이내믹한 굿즈 아이디어로 정리해 보세요!",
            "고구려 무사·기마 이야기를 짧은 웹툰이나 만화로 그려 보세요!",
            "고구려 유물 중 가장 인상 깊은 1점을 골라 SNS 큐레이션 카드를 만들어 보세요!",
          ],
          "백제 우아형": [
            "백제 금동대향로의 무늬를 따라 그려 나만의 향낭 디자인을 만들어 보세요!",
            "공주·부여 백제 문화유적지를 골라 미니 여행 코스를 짜 보세요!",
            "백제 공예(반가사유상·관식)의 곡선미를 분석한 감상문을 써 보세요!",
            "백제 유물 굿즈 아이디어 3가지를 정리해 친구에게 제안해 보세요!",
            "백제 문화를 한 줄로 표현하는 큐레이션 문구를 만들어 보세요!",
          ],
          "조선 절제형": [
            "백자 달항아리의 곡선을 따라 그리며 절제미 감상문을 써 보세요!",
            "훈민정음 해례본을 직접 따라 써 보는 손글씨 챌린지에 도전해 보세요!",
            "조선의 과학기구(앙부일구·측우기)를 조사해 작동 원리를 정리해 보세요!",
            "백자·기록유산을 활용한 깔끔한 문구류 굿즈 아이디어를 그려 보세요!",
            "조선 기록문화를 활용해 '나의 하루 기록 일지'를 만들어 보세요!",
          ],
        };

        function getRandomSuggestion(type) {
          const list = SUGGESTIONS[type];
          const idx = Math.floor(Math.random() * list.length);
          return list[idx];
        }

        const RESULT_TYPES_DATA = {
            "신라 화려형": {
                emoji: "👑",
                img: "https://vibe-coding-characters.vercel.app/img/history-m/silla1.png",
                colors: ["#FDB99B", "#CF8BF3"],
                description: "금관과 장신구처럼 화려하고 정교한 아름다움에 끌리는 타입입니다."
            },
            "고구려 역동형": {
                emoji: "⚔️",
                img: "https://vibe-coding-characters.vercel.app/img/history-m/goguryeo1.png",
                colors: ["#FF512F", "#F09819"],
                description: "힘 있고 활동적인 분위기와 도전적인 이야기에 끌리는 타입입니다."
            },
            "백제 우아형": {
                emoji: "🍃",
                img: "https://vibe-coding-characters.vercel.app/img/history-m/baekje1.png",
                colors: ["#56CCF2", "#2F80ED"],
                description: "섬세하고 세련된 공예와 조화로운 아름다움에 끌리는 타입입니다."
            },
            "조선 절제형": {
                emoji: "🌿",
                img: "https://vibe-coding-characters.vercel.app/img/history-m/joseon1.png",
                colors: ["#BDC3C7", "#2C3E50"],
                description: "단정하고 실용적이며 오래 보아도 질리지 않는 아름다움에 끌리는 타입입니다."
            }
        };

        const PRIORITY_ORDER = ["신라 화려형", "고구려 역동형", "백제 우아형", "조선 절제형"];

        let currentIdx = 0;
        let selectedAnswers = {};

        // 표준 폭죽 함수 보존 포함
        function safeConfetti(opts) {
            if (typeof confetti === 'undefined') return;
            try { confetti(opts); } catch (e) {}
        }

        function fireEmojiConfetti(emoji, colors) {
            if (typeof confetti === 'undefined') return;
            try {
                const shape = confetti.shapeFromText({ text: emoji, scalar: 4 });
                const baseOption = {
                    particleCount: 60, spread: 90, startVelocity: 55, ticks: 250,
                    shapes: [shape], scalar: 4, colors: colors, gravity: 0.8, drift: 0.1
                };
                confetti({ ...baseOption, origin: { x: 0.1, y: 0.9 }, angle: 60 });
                confetti({ ...baseOption, origin: { x: 0.9, y: 0.9 }, angle: 120 });
                setTimeout(() => {
                    confetti({ ...baseOption, particleCount: 40, origin: { x: 0.5, y: 0.8 }, angle: 90, spread: 120 });
                }, 300);
            } catch (e) {}
        }

        function startQuiz() {
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("question-screen").style.display = "flex";
            currentIdx = 0;
            selectedAnswers = {};
            loadQuestion();
        }

        function loadQuestion() {
            const currentData = QUIZ_QUESTIONS[currentIdx];
            
            document.getElementById("progress-text").innerText = `Q${currentIdx + 1} / ${QUIZ_QUESTIONS.length}`;
            const progressPercent = ((currentIdx + 1) / QUIZ_QUESTIONS.length) * 100;
            document.getElementById("progress-bar").style.width = `${progressPercent}%`;

            const backBtn = document.getElementById("back-btn");
            if(currentIdx === 0) {
                backBtn.style.visibility = "hidden";
            } else {
                backBtn.style.visibility = "visible";
            }

            document.getElementById("q-text").innerText = currentData.q;

            const wrapper = document.getElementById("options-wrapper");
            wrapper.innerHTML = "";

            currentData.options.forEach((opt, idx) => {
                const card = document.createElement("label");
                card.className = "option-card";
                if(selectedAnswers[currentIdx] === opt.type) {
                    card.classList.add("selected");
                }

                card.innerHTML = `
                    <input type="radio" name="q_group_item" value="${opt.type}" ${selectedAnswers[currentIdx] === opt.type ? 'checked' : ''} onchange="selectOption(this, ${currentIdx})">
                    <span>${opt.text}</span>
                `;

                // ⑤ 선택 카드 ripple 원형 확산 구현
                card.addEventListener('click', function(e) {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    const circle = document.createElement('span');
                    circle.className = 'ripple';
                    circle.style.left = `${x}px`;
                    circle.style.top = `${y}px`;
                    
                    const prevRipple = card.querySelector('.ripple');
                    if(prevRipple) prevRipple.remove();
                    
                    card.appendChild(circle);
                });

                wrapper.appendChild(card);
            });

            const mainBtn = document.getElementById("next-submit-btn");
            if (currentIdx === QUIZ_QUESTIONS.length - 1) {
                mainBtn.innerText = "📊 나의 역사 감성 알아보기";
            } else {
                mainBtn.innerText = "다음 질문으로 ➡️";
            }
        }

        function selectOption(input, index) {
            selectedAnswers[index] = input.value;
            const allCards = document.querySelectorAll(".option-card");
            allCards.forEach(c => c.classList.remove("selected"));
            input.parentElement.classList.add("selected");
        }

        function goBack() {
            if(currentIdx > 0) {
                const box = document.getElementById("question-area-box");
                box.style.transform = "translateX(20px)";
                setTimeout(() => {
                    currentIdx--;
                    loadQuestion();
                    box.style.transform = "translateX(0px)";
                }, 100);
            }
        }

        function processNext() {
            if (!selectedAnswers[currentIdx]) {
                alert("답변을 선택해 주세요.");
                return;
            }

            if (currentIdx < QUIZ_QUESTIONS.length - 1) {
                const box = document.getElementById("question-area-box");
                box.style.transform = "translateX(-20px)";
                setTimeout(() => {
                    currentIdx++;
                    loadQuestion();
                    box.style.transform = "translateX(0px)";
                }, 100);
            } else {
                runResultSequence();
            }
        }

        // 🚨 [3단계 핵심 등장 연출 시퀀스 타임라인에 따른 구현]
        function runResultSequence() {
            document.getElementById("question-screen").style.display = "none";
            
            // 점수 집계 코어 로직
            const scoreMap = { "신라 화려형": 0, "고구려 역동형": 0, "백제 우아형": 0, "조선 절제형": 0 };
            for(let i=0; i<QUIZ_QUESTIONS.length; i++) {
                scoreMap[selectedAnswers[i]]++;
            }

            // 우선순위 정렬 및 1, 2위 연산
            let sortedTypes = [...PRIORITY_ORDER].sort((a, b) => {
                if (scoreMap[b] !== scoreMap[a]) return scoreMap[b] - scoreMap[a];
                return PRIORITY_ORDER.indexOf(a) - PRIORITY_ORDER.indexOf(b);
            });

            const winnerType = sortedTypes[0];
            const runnerUpType = sortedTypes[1];
            const scoreDiff = scoreMap[winnerType] - scoreMap[runnerUpType];

            // ③ 점수 차이별 분석 멘트 바인딩
            let analysisComment = "";
            if (scoreMap[winnerType] === scoreMap[runnerUpType]) {
                analysisComment = `당신은 여러 매력을 함께 가진 균형형이에요.<br>그중에서도 [${winnerType}] 성향이 살짝 더 강해요.`;
            } else if (scoreDiff >= 3) {
                analysisComment = `당신은 확실한 [${winnerType}]이에요!<br>이 성향이 강하게 나타났어요.`;
            } else {
                analysisComment = `당신은 [${winnerType}] 성향이 가장 두드러지지만,<br>다른 면도 함께 가지고 있어요.`;
            }

            const targetData = RESULT_TYPES_DATA[winnerType];

            // 미리 결과 화면에 요소 주입 (정착 준비)
            document.getElementById("res-type").innerText = winnerType;
            document.getElementById("res-analysis-comment").innerHTML = analysisComment;
            document.getElementById("res-description").innerText = targetData.description;
            document.getElementById("res-suggestion").innerText = getRandomSuggestion(winnerType);

            // ──────────────────────────────────────────
            // [Step 1] 분석 중 로딩 — 0.0s ~ 1.5s
            // ──────────────────────────────────────────
            const loadingScreen = document.getElementById("loading-screen");
            loadingScreen.style.display = "flex";

            // ──────────────────────────────────────────
            // [Step 2] 캐릭터 인트로 — 1.5s 🎉
            // ──────────────────────────────────────────
            setTimeout(() => {
                loadingScreen.style.display = "none";
                
                const introScreen = document.getElementById("character-intro");
                introScreen.style.display = "flex";
                
                const subText = document.getElementById("intro-sub-text");
                const mainType = document.getElementById("intro-main-type");
                const imgArea = document.getElementById("intro-img-area");

                mainType.innerText = `${winnerType}!`;
                imgArea.innerHTML = `<img id="intro-actor" src="${targetData.img}" class="intro-char-img" onerror="this.outerHTML='<span class=\\'fallback-emoji-style\\'>${targetData.emoji}</span>'">`;
                
                const actorImg = document.getElementById("intro-actor");

                // 1.5s: "당신은..." 페이드 인 (0.4초)
                subText.classList.add("fade-in");

                // 1.9s: 유형명 등장 (위에서 떨어짐)
                setTimeout(() => {
                    mainType.classList.add("drop-in");
                }, 400);

                // 2.1s: 캐릭터 등장 (300px, 바운스)
                setTimeout(() => {
                    if(actorImg) actorImg.classList.add("bounce-in");
                }, 600);

                // 2.7s: 폭죽 발사 🎉 (0.6초 후)
                setTimeout(() => {
                    fireEmojiConfetti(targetData.emoji, targetData.colors);
                }, 1200);

                // ──────────────────────────────────────────
                // [Step 3 & 4] 페이드 아웃 + 최종 결과 화면 완성 — 3.5s
                // ──────────────────────────────────────────
                setTimeout(() => {
                    // "당신은..." 및 상단 텍스트 구조 페이드아웃
                    subText.className = "intro-sub toggle-out";
                    subText.style.opacity = "0";
                    mainType.style.transition = "opacity 0.4s";
                    mainType.style.opacity = "0";

                    // 캐릭터 크기 130px 축소 변환 애니메이션
                    if(actorImg && actorImg.tagName === "IMG") {
                        actorImg.classList.remove("bounce-in");
                        actorImg.classList.add("shrink-settle");
                    }

                    // 최종 결과 컨테이너 연결 브릿지 안착
                    const resultScreen = document.getElementById("result-screen");
                    const finalFrame = document.getElementById("res-img-frame");
                    
                    // 인트로에 쓰던 노드를 그대로 정착 레이아웃 내부로 패스
                    finalFrame.appendChild(imgArea.firstChild);
                    
                    // 정착된 타겟 이미지에 고유 무한 루프 wobbleBig 부여
                    const finalActor = finalFrame.firstChild;
                    if(finalActor) {
                        if(finalActor.classList) {
                            finalActor.classList.remove("intro-char-img", "shrink-settle");
                            finalActor.classList.add("final-char-img", "wobble-active");
                        }
                    }

                    introScreen.style.display = "none";
                    resultScreen.style.display = "flex";
                    
                    // 결과 화면 본문 페이드 인
                    setTimeout(() => {
                        resultScreen.style.opacity = "1";
                        
                        // ④ 정보 카드 stagger 등장 (0.15s 간격)
                        const staggers = resultScreen.querySelectorAll(".stagger-item");
                        staggers.forEach((item, sIdx) => {
                            setTimeout(() => {
                                item.classList.add("fade-in-active");
                            }, sIdx * 150);
                        });

                        // ⑤ 💡 실천제안 박스 강조 등장 (scale + glow)
                        setTimeout(() => {
                            document.getElementById("res-suggestion-card").classList.add("glow-in");
                        }, staggers.length * 150);

                    }, 50);

                }, 2000); // 1.5s 기점 + 2.0s 경과 = 3.5s 시점 진입

            }, 1500);
        }

        function resetQuiz() {
            // 모든 동적 클래스 초기화 리셋
            document.getElementById("intro-sub-text").className = "intro-sub";
            document.getElementById("intro-sub-text").style.opacity = "";
            document.getElementById("intro-main-type").className = "intro-main";
            document.getElementById("intro-main-type").style.opacity = "";
            
            const suggCard = document.getElementById("res-suggestion-card");
            suggCard.className = "suggestion-box";
            
            const staggers = document.querySelectorAll(".stagger-item");
            staggers.forEach(item => item.className = "stagger-item");

            const resultScreen = document.getElementById("result-screen");
            resultScreen.style.display = "none";
            resultScreen.style.opacity = "0";
            
            document.getElementById("start-screen").style.display = "flex";
            
            currentIdx = 0;
            selectedAnswers = {};
        }
    </script>
</body>
</html>
